name = "differ-server"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
JWT_ISSUER = "differ"
CDN_BASE = "https://differ-assets.joe-brothers.com"

# Local dev uses same bindings; wrangler d1 --local persists to .wrangler/
[[d1_databases]]
binding = "DB"
database_name = "differ"
database_id = "00000000-0000-0000-0000-000000000000" # replaced on `wrangler d1 create differ`
migrations_dir = "src/db/migrations"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Rate limit bindings (period: 10 or 60 seconds only)
[[unsafe.bindings]]
name = "RL_LOGIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RL_GUEST"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RL_UPGRADE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[observability]
enabled = true
