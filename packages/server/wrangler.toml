name = "differ-server-local"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

# Top-level config = local dev (`wrangler dev`). Production uses the
# `[env.production]` block below; deploy with `pnpm deploy:prod`. Named-env
# bindings DO NOT inherit from top-level — every binding/var must be repeated.

[vars]
JWT_ISSUER = "differ"
CDN_BASE = "https://differ-assets.joe-brothers.com"
ALLOWED_ORIGINS = ""
TURNSTILE_SECRET = ""
MAIL_FROM = "no-reply-local@differ.joe-brothers.com"
MAIL_FROM_NAME = "Differ"
APP_URL = "http://localhost:8080"

# Declared secrets. wrangler validates these are set (via .dev.vars locally,
# `wrangler secret put` remotely) before dev/deploy. Any value listed here must
# NOT also appear in [vars], or the var would overwrite the secret on deploy.
[secrets]
required = ["JWT_SECRET", "TOTP_KEK"]

[[d1_databases]]
binding = "DB"
database_name = "differ-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "src/db/migrations"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "MATCHMAKING_QUEUE"
class_name = "MatchmakingQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MatchmakingQueue"]

# namespace_id 1xxx = local, 2xxx = prod. Counters are shared per namespace_id
# across deployments, so dev tests must not reuse prod IDs.
[[unsafe.bindings]]
name = "RL_LOGIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RL_GUEST"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RL_UPGRADE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 1, period = 60 }

[[unsafe.bindings]]
name = "RL_ROOM"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

# Per-IP cap on outbound-mail-triggering routes (set/resend/forgot/reset).
# Tighter than RL_LOGIN because each request can map to a real send-cost.
[[unsafe.bindings]]
name = "RL_EMAIL"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 3, period = 60 }

[[unsafe.bindings]]
name = "RL_TOTP"
type = "ratelimit"
namespace_id = "1006"
simple = { limit = 5, period = 60 }

[[send_email]]
name = "EMAIL"

[observability]
enabled = true

# Local tail consumer. Wrangler's dev registry connects this to a separate
# `wrangler dev` session running the tail worker (since wrangler v3.79+ /
# 2025-09-23 multi-config support). The service name must match the tail
# worker's local `name`, not its prod name.
[[tail_consumers]]
service = "differ-tail-local"

# Daily Challenge: build the next day's puzzle set at 00:05 UTC. The 5-minute
# offset is buffer for clock skew / cron lag — clients reading exactly at
# midnight may briefly see yesterday's set or hit the lazy-build fallback.
[triggers]
crons = ["5 0 * * *"]

# === Production ============================================================

[env.production]
name = "differ-server"
routes = [{ pattern = "api.differ.joe-brothers.com", custom_domain = true }]

[env.production.placement]
region = "aws:ap-northeast-2"

[env.production.vars]
JWT_ISSUER = "differ"
CDN_BASE = "https://differ-assets.joe-brothers.com"
ALLOWED_ORIGINS = "https://differ.joe-brothers.com"
MAIL_FROM = "no-reply@differ.joe-brothers.com"
MAIL_FROM_NAME = "Differ"
APP_URL = "https://differ.joe-brothers.com"

[env.production.secrets]
required = ["JWT_SECRET", "TURNSTILE_SECRET", "TOTP_KEK"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "differ"
database_id = "4d5c8903-15b7-49b5-ab96-c64f48e36416"
migrations_dir = "src/db/migrations"

[[env.production.durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[env.production.durable_objects.bindings]]
name = "MATCHMAKING_QUEUE"
class_name = "MatchmakingQueue"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["MatchmakingQueue"]

[[env.production.unsafe.bindings]]
name = "RL_LOGIN"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_GUEST"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_UPGRADE"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 1, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_ROOM"
type = "ratelimit"
namespace_id = "2004"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_EMAIL"
type = "ratelimit"
namespace_id = "2005"
simple = { limit = 3, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_TOTP"
type = "ratelimit"
namespace_id = "2006"
simple = { limit = 5, period = 60 }

[[env.production.send_email]]
name = "EMAIL"

[env.production.observability]
enabled = true

# Forward trace events (logs + exceptions) to the tail worker, which fans
# errors out to Discord. The tail worker must be deployed first; otherwise
# `wrangler deploy` fails to validate the consumer reference.
[[env.production.tail_consumers]]
service = "differ-tail"

[env.production.triggers]
crons = ["5 0 * * *"]
