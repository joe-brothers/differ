<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Differ" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <script>
      // Set data-theme before first paint to avoid a light-on-dark flash.
      // ThemeManager replays this on init and is the source of truth afterwards.
      (function () {
        try {
          var v = localStorage.getItem("differ_theme");
          var mode =
            v === "light" || v === "dark"
              ? v
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", mode);
        } catch (e) {
          /* localStorage blocked; ThemeManager handles fallback */
        }
      })();
    </script>
    <title>Differ: Spot-the-difference Game</title>
    <meta
      name="description"
      content="Spot-the-difference multiplayer game. Race friends to find what's changed."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Differ" />
    <meta property="og:title" content="Differ" />
    <meta
      property="og:description"
      content="Spot-the-difference multiplayer game. Race friends to find what's changed."
    />
    <meta property="og:url" content="https://differ.joe-brothers.com" />

    />
    <meta name="twitter:image" content="https://differ.joe-brothers.com/og.webp" />
    <link rel="preconnect" href="https://challenges.cloudflare.com" />
    <script>
      window.onloadTurnstileCallback = function () {
        window.__turnstileReady = true;
      };
    </script>

      src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback&render=explicit"
      crossorigin="anonymous"

      defer
    ></script>
  </head>
